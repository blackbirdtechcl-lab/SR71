<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SR-71 | Blackbird Tech</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold-dark: #1a1410;
  --gold-medium: #2d2416;
  --gold-light: #3d3020;
  --gold-accent: #d4af37;
  --gold-bright: #f0d878;
  --text: #e8dcc4;
  --muted: #a89968;
  --success: #10b981;
  --danger: #ef4444;
  --warning: #f59e0b;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}

body {
  background: var(--gold-dark);
  color: var(--text);
  font-family: var(--sans);
  font-size: 12px;
  line-height: 1.4;
  overflow-x: hidden;
}

/* INTRO */
.intro-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: black;
  z-index: 10000;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 1s;
}

.intro-overlay.hidden { opacity: 0; pointer-events: none; }
#introVideo { width: 100%; height: 100%; object-fit: cover; }

.play-btn, .skip-btn {
  position: absolute;
  padding: 15px 30px;
  background: var(--gold-accent);
  color: var(--gold-dark);
  border: none;
  border-radius: 4px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}

.play-btn {
  font-size: 16px;
  padding: 20px 40px;
}

.skip-btn {
  bottom: 30px;
  right: 30px;
  font-size: 12px;
  padding: 10px 20px;
}

.play-btn:hover, .skip-btn:hover {
  background: var(--gold-bright);
  transform: scale(1.05);
}

/* AUDIO PLAYER - ABAJO IZQUIERDA CON SCRAMJET */
.audio-player {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 9999;
  cursor: pointer;
  opacity: 0;
  animation: fadeIn 0.5s ease 2s forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

.sr71-icon {
  width: 55px;
  height: 55px;
  background: linear-gradient(135deg, var(--gold-accent), var(--gold-bright));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
  transition: all 0.3s;
  position: relative;
}

.sr71-icon::before {
  content: '✈';
  font-size: 22px;
  color: var(--gold-dark);
  transform: rotate(-45deg);
}

.sr71-icon.playing::before {
  animation: scramjet 1.2s ease-in-out infinite;
}

.sr71-icon:hover {
  transform: scale(1.15);
  box-shadow: 0 0 30px rgba(212, 175, 55, 0.7);
}

.sr71-icon:hover::after {
  content: '🔥';
  position: absolute;
  right: -8px;
  top: -8px;
  font-size: 16px;
  animation: fire 0.4s ease infinite;
}

@keyframes scramjet {
  0%, 100% { transform: rotate(-45deg) translateX(0) translateY(0); }
  25% { transform: rotate(-45deg) translateX(3px) translateY(-3px); }
  50% { transform: rotate(-45deg) translateX(5px) translateY(-5px); }
  75% { transform: rotate(-45deg) translateX(3px) translateY(-3px); }
}

@keyframes fire {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(0.9); }
}

/* SR-71 BG PHOTOS */
.sr71-bg-1, .sr71-bg-2, .sr71-bg-3 {
  position: fixed;
  opacity: 0.06;
  filter: grayscale(0.5);
  z-index: 0;
  pointer-events: none;
}

.sr71-bg-1 { top: 80px; right: -80px; width: 350px; transform: rotate(5deg); }
.sr71-bg-2 { bottom: 60px; left: -60px; width: 300px; transform: rotate(-8deg); }
.sr71-bg-3 { top: 45%; right: 8%; width: 250px; transform: rotate(12deg); }

/* HEADER */
.header {
  padding: 12px 20px;
  background: var(--gold-medium);
  border-bottom: 1px solid var(--gold-accent);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 1;
}

.logo {
  font-size: 14px;
  font-weight: 600;
  color: var(--gold-bright);
  letter-spacing: 1px;
}

.header-right {
  display: flex;
  gap: 10px;
  align-items: center;
}

.chip {
  padding: 3px 8px;
  background: var(--gold-light);
  border-radius: 3px;
  font-size: 9px;
  font-family: var(--mono);
  color: var(--muted);
  border: 1px solid var(--gold-accent);
}

.admin-btn {
  padding: 5px 12px;
  background: var(--gold-accent);
  color: var(--gold-dark);
  border: none;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 600;
  cursor: pointer;
}

/* CONTAINER */
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 16px;
  position: relative;
  z-index: 1;
}

.grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 12px;
}

/* INTEL FEED */
.intel-section {
  grid-column: span 8;
  background: var(--gold-medium);
  border: 1px solid var(--gold-light);
  border-radius: 4px;
  padding: 12px;
  max-height: 300px;
  overflow-y: auto;
}

.intel-title {
  font-size: 10px;
  font-weight: 600;
  color: var(--gold-accent);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--gold-light);
}

.intel-item {
  padding: 8px 0;
  border-bottom: 1px solid var(--gold-light);
}

.intel-item:last-child { border-bottom: none; }

.intel-item-title {
  font-size: 11px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 3px;
}

.intel-item-summary {
  font-size: 10px;
  color: var(--muted);
  line-height: 1.4;
}

.intel-impact {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  margin-right: 6px;
}

.impact-high { background: var(--danger); }
.impact-medium { background: var(--warning); }

/* METRICS */
.metrics-section {
  grid-column: span 4;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.metric {
  background: var(--gold-medium);
  border: 1px solid var(--gold-light);
  border-radius: 4px;
  padding: 10px;
  text-align: center;
}

.metric-label {
  font-size: 8px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}

.metric-value {
  font-size: 16px;
  font-weight: 600;
  color: var(--gold-bright);
  font-family: var(--mono);
}

.metric-change {
  font-size: 9px;
  margin-top: 2px;
}

.up { color: var(--success); }
.down { color: var(--danger); }

/* CHART */
.chart-section {
  grid-column: span 8;
  background: var(--gold-medium);
  border: 1px solid var(--gold-light);
  border-radius: 4px;
  padding: 12px;
}

.chart-title {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}

#chart { height: 220px; }

/* SYSTEMS */
.systems-section {
  grid-column: span 4;
  background: var(--gold-medium);
  border: 1px solid var(--gold-light);
  border-radius: 4px;
  padding: 12px;
}

.system-item {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid var(--gold-light);
  font-size: 10px;
}

.system-item:last-child { border-bottom: none; }

.system-name {
  font-family: var(--mono);
  color: var(--text);
}

.system-status {
  color: var(--success);
  font-size: 9px;
}

@media (max-width: 768px) {
  .intel-section, .metrics-section, .chart-section, .systems-section {
    grid-column: span 12;
  }
  .metrics-section {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>
<body>

<!-- INTRO -->
<div class="intro-overlay" id="introOverlay">
  <video id="introVideo" muted playsinline>
    <source src="/sr71_9sec.mp4" type="video/mp4">
  </video>
  <button class="play-btn" id="playBtn" onclick="startExperience()">▶ INICIAR SR-71</button>
  <button class="skip-btn" onclick="skipIntro()" style="display:none;" id="skipBtn">Skip</button>
</div>

<!-- AUDIO -->
<div class="audio-player" onclick="toggleAudio()">
  <div class="sr71-icon" id="sr71"></div>
</div>
<audio id="bgAudio" loop>
  <source src="/macarena.mp3" type="audio/mpeg">
</audio>

<!-- SR-71 PHOTOS -->
<img src="/sr3.jpeg" class="sr71-bg-1" alt="">
<img src="/sr5.jpeg" class="sr71-bg-2" alt="">
<img src="/sr7.jpeg" class="sr71-bg-3" alt="">

<!-- HEADER -->
<div class="header">
  <div class="logo">SR-71 BLACKBIRD TECH</div>
  <div class="header-right">
    <div class="chip">TRUMKILL</div>
    <div class="chip">P2P</div>
    <button class="admin-btn" onclick="openAdmin()">Admin</button>
  </div>
</div>

<!-- MAIN -->
<div class="container">
  <div class="grid">
    
    <!-- INTEL FEED -->
    <div class="intel-section">
      <div class="intel-title">🌍 INTEL FEED</div>
      <div id="intelFeed">Loading intel...</div>
    </div>

    <!-- METRICS -->
    <div class="metrics-section">
      <div class="metric">
        <div class="metric-label">Bitcoin</div>
        <div class="metric-value" id="btcPrice">$94,234</div>
        <div class="metric-change up">+2.4%</div>
      </div>
      <div class="metric">
        <div class="metric-label">USD/CLP</div>
        <div class="metric-value">985.40</div>
        <div class="metric-change down">-0.3%</div>
      </div>
      <div class="metric">
        <div class="metric-label">VIX</div>
        <div class="metric-value">18.4</div>
        <div class="metric-change down">-3.2%</div>
      </div>
      <div class="metric">
        <div class="metric-label">Uptime</div>
        <div class="metric-value">142h</div>
        <div class="metric-change">6d</div>
      </div>
    </div>

    <!-- CHART -->
    <div class="chart-section">
      <div class="chart-title">BTC/USDT 1H</div>
      <div id="chart"></div>
    </div>

    <!-- SYSTEMS -->
    <div class="systems-section">
      <div class="chart-title">Active Systems</div>
      <div class="system-item">
        <span class="system-name">trumkill.py</span>
        <span class="system-status">Running</span>
      </div>
      <div class="system-item">
        <span class="system-name">blackbird_p2p_proxy.py</span>
        <span class="system-status">Running</span>
      </div>
      <div class="system-item">
        <span class="system-name">blackbird_intel.py</span>
        <span class="system-status">Cron</span>
      </div>
    </div>

  </div>
</div>

<script>
// INTRO & AUDIO
const intro = document.getElementById('introOverlay');
const introVideo = document.getElementById('introVideo');
const playBtn = document.getElementById('playBtn');
const skipBtn = document.getElementById('skipBtn');
const audio = document.getElementById('bgAudio');
const sr71 = document.getElementById('sr71');
let isPlaying = false;

function startExperience() {
  playBtn.style.display = 'none';
  skipBtn.style.display = 'block';
  
  // Play video
  introVideo.play().catch(e => console.log('Video:', e));
  
  // Play audio
  audio.play().then(() => {
    isPlaying = true;
    sr71.classList.add('playing');
  }).catch(e => console.log('Audio:', e));
}

introVideo.addEventListener('ended', () => skipIntro());

function skipIntro() {
  intro.classList.add('hidden');
  setTimeout(() => intro.style.display = 'none', 1000);
}

function toggleAudio() {
  if (isPlaying) {
    audio.pause();
    sr71.classList.remove('playing');
  } else {
    audio.play().then(() => sr71.classList.add('playing')).catch(e => {});
  }
  isPlaying = !isPlaying;
}

// INTEL FEED
async function loadIntel() {
  try {
    const res = await fetch('/intel_feed.json?t=' + Date.now());
    const data = await res.json();
    const container = document.getElementById('intelFeed');
    container.innerHTML = '';
    
    data.news.forEach(item => {
      const impactClass = item.impact === 'high' ? 'impact-high' : 'impact-medium';
      const html = `
        <div class="intel-item">
          <div class="intel-item-title">
            <span class="intel-impact ${impactClass}"></span>${item.title}
          </div>
          <div class="intel-item-summary">${item.summary}</div>
        </div>
      `;
      container.innerHTML += html;
    });
  } catch (e) {
    document.getElementById('intelFeed').innerHTML = '<div class="intel-item"><div class="intel-item-summary">Intel feed will update hourly</div></div>';
  }
}

loadIntel();
setInterval(loadIntel, 3600000);

// CANDLESTICK CHART
const chartElement = document.getElementById('chart');
const chart = LightweightCharts.createChart(chartElement, {
  width: chartElement.clientWidth,
  height: 220,
  layout: {
    background: { color: '#1a1410' },
    textColor: '#a89968',
  },
  grid: {
    vertLines: { color: '#3d3020' },
    horzLines: { color: '#3d3020' },
  },
  timeScale: {
    borderColor: '#3d3020',
  },
});

const candleSeries = chart.addCandlestickSeries({
  upColor: '#10b981',
  downColor: '#ef4444',
  borderVisible: false,
  wickUpColor: '#10b981',
  wickDownColor: '#ef4444',
});

const data = [];
let base = 94000;
let time = Math.floor(Date.now() / 1000) - 24 * 3600;

for (let i = 0; i < 24; i++) {
  const open = base + (Math.random() - 0.5) * 2000;
  const close = open + (Math.random() - 0.5) * 1500;
  const high = Math.max(open, close) + Math.random() * 500;
  const low = Math.min(open, close) - Math.random() * 500;
  
  data.push({
    time: time + i * 3600,
    open, high, low, close
  });
}

candleSeries.setData(data);
chart.timeScale().fitContent();

// BTC PRICE
async function updateBTC() {
  try {
    const res = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT');
    const data = await res.json();
    document.getElementById('btcPrice').textContent = '$' + parseFloat(data.lastPrice).toLocaleString('en-US', {maximumFractionDigits: 0});
  } catch (e) {}
}

updateBTC();
setInterval(updateBTC, 60000);
</script>

</body>
<script src="ticker.js"></script>
</html>
