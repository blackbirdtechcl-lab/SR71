<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Dashboard P2P | SR-71</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1410;color:#e8dcc4;font-family:"IBM Plex Sans",sans-serif;padding:20px}.header{border-bottom:1px solid #d4af37;padding-bottom:20px;margin-bottom:30px}.btn{background:#d4af37;color:#1a1410;padding:12px 24px;border:none;border-radius:4px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block}.order-form{background:#2d2416;padding:30px;border-radius:8px;margin-bottom:30px}.order-form input{width:100%;padding:12px;margin:10px 0;background:#1a1410;border:1px solid #d4af37;color:#e8dcc4;border-radius:4px}.orders{background:#2d2416;padding:20px;border-radius:8px}.order-item{padding:15px;border-bottom:1px solid #3d3020;margin-bottom:10px}</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="header"><h1>SR-71 P2P Dashboard</h1><a href="/" class="btn">← Inicio</a></div>
<div class="order-form"><h2>Comprar USDT</h2>
<input type="number" id="usdtAmount" placeholder="Cantidad USDT">
<input type="text" id="walletAddress" placeholder="Tu dirección TRC20">
<button class="btn" onclick="createOrder()">Crear Orden</button></div>
<div class="orders"><h2>Mis Órdenes</h2><div id="ordersList">Cargando...</div></div>
<script>
const supabase=window.supabase.createClient("https://qbvmaamqdowvlsegtihz.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.demo");
async function createOrder(){
const usdt=document.getElementById("usdtAmount").value;
const wallet=document.getElementById("walletAddress").value;
if(!usdt||!wallet){alert("Completa todos los campos");return}
const rate=930;
const clp=Math.round(usdt*rate);
const{data,error}=await supabase.from("p2p_orders").insert({user_id:1,usdt_amount:usdt,clp_amount:clp,exchange_rate:rate,wallet_address:wallet,status:"pending"});
if(error)alert("Error: "+error.message);else{alert("Orden creada. Total: $"+clp.toLocaleString()+" CLP");loadOrders()}}
async function loadOrders(){
const{data}=await supabase.from("p2p_orders").select("*").order("created_at",{ascending:false});
document.getElementById("ordersList").innerHTML=data?data.map(o=>`<div class="order-item">${o.usdt_amount} USDT - $${o.clp_amount.toLocaleString()} CLP - ${o.status}</div>`).join(""):"Sin órdenes"}
loadOrders()
</script>
</body>
</html>
